<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Key</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body{
    font-family: "Times New Roman", Times, serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    color: #000;
    background: #fff;
    line-height: 1.5;
  }
  h1{
    font-size: 26px;
    border-bottom: 2px solid #000;
    padding-bottom: 8px;
    margin-bottom: 4px;
  }
  p.intro{
    font-size: 16px;
    margin-top: 0;
    margin-bottom: 20px;
  }
  #map{
    height: 600px;
    width: 100%;
    border: 1px solid #000;
  }
  .leaflet-popup-content{
    font-family: "Times New Roman", Times, serif;
    font-size: 15px;
  }
  .leaflet-popup-content a{
    color: #0000EE;
  }
</style>
</head>
<body>

<h1>Swabia 1:86.4k — Map Key</h1>
<p class="intro">Bohnenberger's 1798&ndash;1828 survey of Swabia (Charte von Schwaben), 1:86,400. Each square marks the approximate area covered by one sheet &mdash; click a square to see which sheet it is and open it on Wikimedia Commons.</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  /* ============================================================
     EDIT THIS LIST to add, remove, or move sheet squares.

     Each sheet needs:
       title  — shown in the popup
       url    — where the square links to
       bounds — the corners of the square, as
                [[southLat, westLng], [northLat, eastLng]]

     HOW TO FIND COORDINATES FOR A REAL SHEET:
     1. Go to google.com/maps
     2. Right-click the sheet's south-west corner on the map,
        click the coordinates that pop up to copy them (lat, lng)
     3. Do the same for the north-east corner
     4. Paste both into a sheet's "bounds" below

     The starting point (map center + zoom) is set further down
     in the script, under "INITIAL MAP VIEW".
     ============================================================ */
  const sheets = [
    { title: "Sheet 1 — Weißenburg", url: "https://opendigi.ub.uni-tuebingen.de/opendigi/FhXIV1a_qt#p=2", bounds: [[48.8405, 7.5528], [49.1539, 7.9600]] },
    { title: "Sheet 2 — Rastatt", url: "https://opendigi.ub.uni-tuebingen.de/opendigi/FhXIV1a_qt#p=3", bounds: [[48.8405, 8.0011], [49.1334, 8.3604]] },
    { title: "Sheet 3 — Karlsruhe", url: "https://opendigi.ub.uni-tuebingen.de/opendigi/FhXIV1a_qt#p=4", bounds: [[48.8542, 8.3874], [49.1468, 8.7846]] },
    { title: "Sheet 10 - Strassburg", url: "https://opendigi.ub.uni-tuebingen.de/opendigi/FhXIV1a_qt#p=11", bounds: [[48.5255, 7.5838], [48.8369, 7.9695]] },
    { title: "Sheet 11 - Baden", url: "https://opendigi.ub.uni-tuebingen.de/opendigi/FhXIV1a_qt#p=12", bounds: [[48.5390, 7.9714], [48.8521, 8.3830]] },
  ];
  /* ============================================================ */

  // ---- INITIAL MAP VIEW ----
  // [latitude, longitude], zoom level (higher = closer in)
  const map = L.map('map').setView([48.4, 9.6], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  sheets.forEach(sheet => {
    const rect = L.rectangle(sheet.bounds, {
      color: '#9c4a2e',
      weight: 2,
      fillOpacity: 0.15
    }).addTo(map);

    rect.bindPopup(
      `<strong>${sheet.title}</strong><br><a href="${sheet.url}" target="_blank" rel="noopener noreferrer">View sheet →</a>`
    );

    rect.on('mouseover', () => rect.setStyle({ fillOpacity: 0.35 }));
    rect.on('mouseout', () => rect.setStyle({ fillOpacity: 0.15 }));
  });
</script>

</body>
</html>
