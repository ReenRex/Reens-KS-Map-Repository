<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Directory</title>
<style>
  body{
    font-family: "Times New Roman", Times, serif;
    background: #ffffff;
    color: #000000;
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px;
    font-size: 17px;
    line-height: 1.6;
  }
  h1{
    font-size: 26px;
    margin-bottom: 4px;
  }
  p.intro{
    margin-top: 0;
    margin-bottom: 20px;
  }
  .breadcrumb{
    margin-bottom: 20px;
    font-size: 15px;
  }
  .breadcrumb a{
    color: #0000EE;
    text-decoration: underline;
  }
  ul{
    list-style-type: disc;
    padding-left: 25px;
  }
  li{
    margin-bottom: 8px;
  }
  a{
    color: #0000EE;
    text-decoration: underline;
    cursor: pointer;
  }
  a:visited{
    color: #551A8B;
  }
  hr{
    margin: 25px 0;
  }
  .tutorial-link{
    font-size: 15px;
    margin-left: 10px;
  }
  .modal-overlay{
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open{
    display: flex;
  }
  .modal-box{
    background: #ffffff;
    border: 1px solid #000000;
    max-width: 600px;
    width: 100%;
    padding: 20px;
  }
  .modal-header{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #000000;
    padding-bottom: 8px;
    margin-bottom: 15px;
  }
  .modal-header h2{
    font-size: 20px;
    margin: 0;
  }
  .modal-close{
    font-size: 15px;
  }
  .tutorial-step{
    margin-bottom: 20px;
  }
  .tutorial-step p{
    margin: 6px 0 0;
    font-size: 15px;
  }
  .screenshot-placeholder{
    border: 1px dashed #666;
    background: #f2f2f2;
    color: #666;
    text-align: center;
    padding: 40px 10px;
    font-size: 14px;
  }
  .tutorial-step img{
    max-width: 100%;
    border: 1px solid #000000;
    display: block;
  }
</style>
</head>
<body>

<h1>Map Directory</h1>
<p class="intro">A directory of historical maps, organized by region, country, and century.</p>

<div class="breadcrumb" id="breadcrumb"></div>

<div id="content"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <a class="modal-close" id="modalClose">Close</a>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  /* ============================================================
     EDIT THIS DATA to add continents, countries, centuries, and links.

     Structure:
     continent -> country -> century -> list of links
     each link needs: title, url
     each link can optionally have a "tutorial" array — a list of
     steps, each with a caption and a screenshot (src).
     Leave src as "" to show a placeholder box, or fill it with an
     image path/data URL once you have real screenshots.
     Leave the whole "tutorial" key off a link entirely if that
     map doesn't need a download tutorial.
     ============================================================ */
  const data = {
    "Europe": {
      "France": {
        "18th Century": [],
        "19th Century": [],
        "20th Century": [
          {
            title: "France 1:50,000 1950s Map",
            url: "https://cartes.gouv.fr/rechercher-une-donnee/dataset/IGNF_SCAN-50-HISTO",
            tutorial: [
              { caption: "Step 1: Search for the map on the site.", src: "" },
              { caption: "Step 2: Select the sheet you need.", src: "" },
              { caption: "Step 3: Click download and choose your format.", src: "" }
            ]
          }
        ]
      }
    }
  };
  /* ============================================================ */

  let path = []; // e.g. ["Europe", "France", "20th Century"]

  function goTo(newPath){
    path = newPath;
    render();
  }

  function render(){
    const contentEl = document.getElementById('content');
    const crumbEl = document.getElementById('breadcrumb');

    // Breadcrumb
    crumbEl.innerHTML = '';
    const homeLink = document.createElement('a');
    homeLink.textContent = 'Home';
    homeLink.addEventListener('click', () => goTo([]));
    crumbEl.appendChild(homeLink);

    path.forEach((p, i) => {
      crumbEl.appendChild(document.createTextNode(' > '));
      if(i === path.length - 1){
        crumbEl.appendChild(document.createTextNode(p));
      } else {
        const crumbLink = document.createElement('a');
        crumbLink.textContent = p;
        const targetPath = path.slice(0, i + 1);
        crumbLink.addEventListener('click', () => goTo(targetPath));
        crumbEl.appendChild(crumbLink);
      }
    });

    // Walk to current level in data
    let level = data;
    for(const p of path){
      level = level[p];
    }

    contentEl.innerHTML = '';

    if(path.length < 3){
      // still navigating continent -> country -> century
      const keys = Object.keys(level);
      if(keys.length === 0){
        const emptyMsg = document.createElement('p');
        emptyMsg.textContent = 'Nothing listed here yet.';
        contentEl.appendChild(emptyMsg);
      } else {
        const ul = document.createElement('ul');
        keys.forEach(k => {
          const li = document.createElement('li');
          const link = document.createElement('a');
          link.textContent = k;
          const targetPath = [...path, k];
          link.addEventListener('click', () => goTo(targetPath));
          li.appendChild(link);
          ul.appendChild(li);
        });
        contentEl.appendChild(ul);
      }
    } else {
      // path.length === 3, level is an array of links
      if(level.length === 0){
        const emptyMsg = document.createElement('p');
        emptyMsg.textContent = 'No links added yet for this century.';
        contentEl.appendChild(emptyMsg);
      } else {
        const ul = document.createElement('ul');
        level.forEach(linkData => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = linkData.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = linkData.title;
          li.appendChild(a);

          if(linkData.tutorial && linkData.tutorial.length > 0){
            const tutorialLink = document.createElement('a');
            tutorialLink.textContent = '(Download Tutorial)';
            tutorialLink.className = 'tutorial-link';
            tutorialLink.addEventListener('click', () => openTutorial(linkData.title, linkData.tutorial));
            li.appendChild(tutorialLink);
          }

          ul.appendChild(li);
        });
        contentEl.appendChild(ul);
      }
    }
  }

  render();

  // ---- Tutorial modal ----
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  const modalClose = document.getElementById('modalClose');

  function openTutorial(title, steps){
    modalTitle.textContent = title + ' — Download Tutorial';
    modalBody.innerHTML = '';
    steps.forEach(step => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'tutorial-step';

      if(step.src){
        const img = document.createElement('img');
        img.src = step.src;
        img.alt = step.caption;
        stepDiv.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'screenshot-placeholder';
        placeholder.textContent = 'Screenshot not added yet';
        stepDiv.appendChild(placeholder);
      }

      const caption = document.createElement('p');
      caption.textContent = step.caption;
      stepDiv.appendChild(caption);

      modalBody.appendChild(stepDiv);
    });
    modalOverlay.classList.add('open');
  }

  function closeModal(){
    modalOverlay.classList.remove('open');
  }

  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if(e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
